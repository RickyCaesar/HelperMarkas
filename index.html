  <script>
    const fileInput = document.getElementById('file');
    const fileStatus = document.getElementById('fileStatus');
    const npsnInput = document.getElementById('npsnInput');
    const searchBtn = document.getElementById('searchBtn');
    const copyBtn = document.getElementById('copyBtn');
    const resultEl = document.getElementById('result');
    const matchInfo = document.getElementById('matchInfo');
    const libWarn = document.getElementById('libWarn');

    function norm(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[^a-z0-9 ]/g,''); }
    function digits(s){ return String(s??'').replace(/[^\d]/g,''); }
    function safeStr(v){ if(v==null) return ''; if(typeof v==='number'){ return String(Math.trunc(v)); } return String(v); }
    function formatDate(d){ const pad=n=>String(n).padStart(2,'0'); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
    function formatIDR(n){ try { return Number(n||0).toLocaleString('id-ID'); } catch(e){ return String(n); } }
    function formatPercentTrunc(pct, decimals=12){
      const sign = pct < 0 ? '-' : '';
      const abs = Math.abs(pct);
      const intPart = Math.trunc(abs);
      const pow = Math.pow(10, decimals);
      let scaled = Math.floor((abs - intPart) * pow + 1e-12);
      let fracStr = String(scaled).padStart(decimals, '0');
      const intStr = intPart.toLocaleString('id-ID');
      return sign + intStr + ',' + fracStr;
    }

    const DEFAULT_PROGRAM = 'BOS Daerah';
    const DEFAULT_VER_NAME = 'Ricky';
    const DEFAULT_VER_PHONE = '085751664898';
    const DEFAULT_DATE = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Makassar' });

    let dataset = [];
    let npsnIndex = new Map();
    let headerMap = [];
    let currentDana = 0;
    let currentRow = null;
    let danaDisplayEl, userAmountInput, percentDisplayEl;
    let tgTokenInput, tgChatIdInput, tgTopicIdInput, tgStatusEl;
    let verNameInput, verPhoneInput;
    let programSelect;

    function parseCSV(text) {
      const rows = [];
      let i = 0, field = '', row = [], inQuotes = false;
      while (i <= text.length) {
        const c = text[i] || '\n';
        if (inQuotes) {
          if (c === '"') {
            if (text[i+1] === '"') { field += '"'; i += 2; continue; }
            inQuotes = false; i++; continue;
          } else { field += c; i++; continue; }
        } else {
          if (c === '"') { inQuotes = true; i++; continue; }
          if (c === ',' ) { row.push(field); field = ''; i++; continue; }
          if (c === '\n' || c === '\r') {
            if (c === '\r' && text[i+1] === '\n') i++;
            row.push(field); field = '';
            if (row.length > 1 || (row.length===1 && row[0].trim()!=='')) rows.push(row);
            row = []; i++; continue;
          }
          field += c; i++;
        }
      }
      return rows;
    }

    function loadEmbeddedCSV() {
      const el = document.getElementById('csv-data');
      if (!el) return;
      const text = el.textContent || '';
      const rows = parseCSV(text);
      if (!rows.length) return;
      const headers = rows[0].map(h => safeStr(h).trim());
      const hIdx = Object.fromEntries(headers.map((h, i) => [h.toLowerCase(), i]));
      const idxNpsn = hIdx['npsn'];
      const idxNama = (hIdx['nama sekolah'] !== undefined) ? hIdx['nama sekolah'] : hIdx['nama'];
      const out = [];
      for (let r = 1; r < rows.length; r++) {
        const arr = rows[r];
        if (!arr) continue;
        const npsn = safeStr(arr[idxNpsn]).trim();
        const nama = safeStr(arr[idxNama]).trim();
        if (!npsn || !nama) continue;
        const idxDana = hIdx['jumlah dana'];
        const danaText = idxDana !== undefined ? safeStr(arr[idxDana]).trim() : '';
        const danaNum = danaText ? Number(danaText.replace(/[^\d]/g,'')) : 0;
        out.push({
          npsn,
          nama_sekolah: nama,
          status: 'Ditolak',
          tanggal: DEFAULT_DATE,
          program: DEFAULT_PROGRAM,
          verifikator_nama: DEFAULT_VER_NAME,
          verifikator_hp: DEFAULT_VER_PHONE,
          jumlah_dana: danaNum
        });
      }
      dataset = out;
    }

    function buildIndex() {
      npsnIndex.clear();
      dataset.forEach((row, idx) => {
        const v = getField(row, [/^npsn$/]);
        const key1 = digits(v).replace(/^0+/,'');
        const key2 = digits(v).padStart(8,'0');
        if(key1) npsnIndex.set(key1, idx);
        if(key2) npsnIndex.set(key2, idx);
      });
    }

    function getField(row, patterns) {
      const keys = Object.keys(row);
      for (const p of patterns) {
        for (const k of keys) {
          const nk = norm(k);
          if (p.test(nk)) {
            const val = row[k];
            if (val!==undefined && val!==null && String(val).trim()!=='') return val;
          }
        }
      }
      return '';
    }

    function parseCorrections() {
      const el = document.getElementById('correctionsInput');
      const text = el ? el.value : '';
      return safeStr(text).split(/\r?\n/).map(s=>s.trim()).filter(Boolean).slice(0, 20);
    }

    function composeOutput(row, inputNpsn) {
      const rawNpsn = getField(row, [/^npsn$/]);
      const npsnVal = digits(rawNpsn) || digits(inputNpsn);
      const nama = safeStr(getField(row, [/nama.*sekolah/, /^sekolah$/, /^namasekolah$/])).trim() || '(Nama Sekolah tidak tersedia)';
      const statusRaw = safeStr(getField(row, [/status/, /keputusan/, /hasil/])).toLowerCase();
      const tglRaw = safeStr(getField(row, [/tanggal/, /^tgl$/, /date/])) || DEFAULT_DATE;
      let tanggal;
      if (tglRaw) {
        if (!isNaN(Number(tglRaw)) && Number(tglRaw) > 30000) {
          const excelEpoch = new Date(1899, 11, 30);
          tanggal = new Date(excelEpoch.getTime() + Number(tglRaw) * 86400000);
        } else {
          const parts = tglRaw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
          if (parts) {
            const d = parseInt(parts[1],10), m=parseInt(parts[2],10)-1, y=parseInt(parts[3].length===2?'20'+parts[3]:parts[3],10);
            tanggal = new Date(y,m,d);
          }
        }
      }
      if (!tanggal || isNaN(tanggal.getTime())) tanggal = new Date();
      let statusText = 'Ditolak pada ' + formatDate(tanggal);
      if (statusRaw.includes('lulus') || statusRaw.includes('terima') || statusRaw.includes('accept')) statusText = 'Diterima pada ' + formatDate(tanggal);
      if (statusRaw && !/tolak|lulus|terima|accept/.test(statusRaw)) statusText = 'Status: ' + statusRaw + ' pada ' + formatDate(tanggal);
      let program = safeStr(getField(row, [/program/, /skema/, /jenis.*bos/, /bos.*daerah/])).trim() || DEFAULT_PROGRAM;
      if (programSelect && programSelect.value) program = programSelect.value;
      const corrections = parseCorrections();
      let verName = safeStr(getField(row, [/verifikator/, /validator/, /petugas/, /nama.*verifikator/])).trim() || DEFAULT_VER_NAME;
      let verPhone = safeStr(getField(row, [/wa/, /hp/, /kontak/, /no.*hp/, /telepon/, /telp/])).trim() || DEFAULT_VER_PHONE;
      if (verNameInput && verNameInput.value.trim()) verName = verNameInput.value.trim();
      if (verPhoneInput && verPhoneInput.value.trim()) verPhone = verPhoneInput.value.trim();
      const lines = [];
      const npsnDisp = npsnVal ? npsnVal : '(NPSN tidak tersedia)';
      lines.push(npsnDisp + ' - ' + nama);
      lines.push(statusText);
      lines.push('');
      lines.push(program);
      lines.push('');
      lines.push('Perlu dijelaskan/diperbaiki :');
      if (corrections.length) {
        corrections.forEach((c, i) => { lines.push(''); lines.push((i+1)+'. '+c); });
      } else {
        lines.push('');
        lines.push('1. koreksi 1');
        lines.push('');
        lines.push('2. Koreksi 2');
        lines.push('');
        lines.push('3. dst');
      }
      lines.push('');
      const verLine = 'Verifikator : ' + (verName || '') + (verPhone ? ' - ' + verPhone : (verName ? '' : '-'));
      lines.push(verLine);
      return lines.join('\n');
    }

    function showResult(text, found) {
      resultEl.textContent = text;
      resultEl.classList.toggle('muted', !found);
      copyBtn.disabled = !text || !found;
    }

    async function loadWorkbook(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = new Uint8Array(reader.result);
            const wb = XLSX.read(data, { type: 'array' });
            resolve(wb);
          } catch (e) { reject(e); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function toDataset(ws) {
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!rows.length) return [];
      const headers = rows[0].map(h => safeStr(h));
      headerMap = headers.map(h => ({ raw: h, norm: norm(h) }));
      const out = [];
      for (let r = 1; r < rows.length; r++) {
        const arr = rows[r];
        if (!arr || arr.every(v => safeStr(v).trim()==='')) continue;
        const obj = {};
        headers.forEach((h, i) => { obj[h] = arr[i]; });
        out.push(obj);
      }
      return out;
    }

    function findByNpsn(input) {
      const q = digits(input);
      if (!q) return { row: null, idx: -1 };
      const k1 = q.replace(/^0+/,'');
      const k2 = q.padStart(8,'0');
      let idx = -1;
      if (npsnIndex.has(k1)) idx = npsnIndex.get(k1);
      else if (npsnIndex.has(k2)) idx = npsnIndex.get(k2);
      else {
        for (let i=0;i<dataset.length;i++){
          const v = safeStr(getField(dataset[i], [/^npsn$/]));
          if (digits(v)===q || digits(v).replace(/^0+/,'')===k1 || digits(v).padStart(8,'0')===k2) { idx = i; break; }
        }
      }
      return { row: idx>=0 ? dataset[idx] : null, idx };
    }

    async function handleFileChange(ev) {
      const file = ev.target.files && ev.target.files[0];
      if (!file) {
        fileStatus.textContent = 'Belum ada file';
        dataset = []; npsnIndex.clear();
        showResult('Hasil akan muncul di sini setelah pencarian.', false);
        matchInfo.textContent = '';
        return;
      }
      fileStatus.textContent = 'Memuat...';
      try {
        if (typeof XLSX === 'undefined') throw new Error('Pustaka XLSX tidak tersedia');
        const wb = await loadWorkbook(file);
        const wsName = wb.SheetNames[0];
        const ws = wb.Sheets[wsName];
        dataset = toDataset(ws);
        buildIndex();
        fileStatus.textContent = 'Terbaca: ' + wsName + ' • ' + dataset.length + ' baris';
        matchInfo.textContent = '';
        showResult('File dimuat. Silakan masukkan NPSN lalu klik Cari.', false);
      } catch (e) {
        fileStatus.textContent = 'Gagal memuat file';
        showResult('Gagal memuat. Pastikan memilih file Excel yang benar.', false);
      }
    }

    function handleSearch() {
      const q = npsnInput.value.trim();
      if (!q) {
        showResult('Masukkan NPSN terlebih dahulu.', false);
        matchInfo.textContent = '';
        return;
      }
      if (!dataset.length) {
        showResult('Data JSON belum tersedia.', false);
        matchInfo.textContent = '';
        return;
      }
      const { row, idx } = findByNpsn(q);
      if (!row) {
        showResult('Data dengan NPSN '+q+' tidak ditemukan.', false);
        matchInfo.textContent = '';
        return;
      }
      const text = composeOutput(row, q);
      showResult(text, true);
      matchInfo.textContent = 'Cocok pada entri: ' + (idx+1);
      currentRow = row;
      currentDana = Number(row.jumlah_dana || 0);
      if (danaDisplayEl) danaDisplayEl.textContent = currentDana ? 'Rp ' + formatIDR(currentDana) : '-';
      if (percentDisplayEl && userAmountInput) {
        const val = Number(String(userAmountInput.value||'').replace(/[^\d]/g,''));
        const pct = currentDana ? (val/currentDana)*100 : 0;
        percentDisplayEl.textContent = currentDana ? ('Persentase: ' + formatPercentTrunc(pct, 12) + '%') : '';
      }
    }

    function handleCopy() {
      const text = resultEl.textContent || '';
      if (!text.trim()) return;
      if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = 'Tersalin';
          setTimeout(()=>{ copyBtn.textContent = 'Salin Hasil'; }, 1200);
        }).catch(()=>{
          const ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch(e){}
          document.body.removeChild(ta);
          copyBtn.textContent = 'Tersalin';
          setTimeout(()=>{ copyBtn.textContent = 'Salin Hasil'; }, 1200);
        });
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch(e){}
        document.body.removeChild(ta);
        copyBtn.textContent = 'Tersalin';
        setTimeout(()=>{ copyBtn.textContent = 'Salin Hasil'; }, 1200);
      }
    }
    
    function refreshResult() {
      if (!currentRow) return;
      const q = npsnInput.value.trim();
      const text = composeOutput(currentRow, q);
      showResult(text, true);
    }
    
    async function sendTelegram(decision) {
      const token = tgTokenInput && tgTokenInput.value.trim();
      const chatId = tgChatIdInput && tgChatIdInput.value.trim();
      if (!token || !chatId) { if (tgStatusEl) tgStatusEl.textContent = 'Isi Token dan Chat ID'; return; }
      const npsn = currentRow ? safeStr(currentRow.npsn || getField(currentRow, [/^npsn$/])) : '';
      const nama = currentRow ? safeStr(currentRow.nama_sekolah || getField(currentRow, [/nama.*sekolah/, /^sekolah$/, /^namasekolah$/])) : '';
      const npsnDigits = digits(npsn);
      const text = decision === 'sah'
        ? 'Pengajuan BOS Daerah ' + npsnDigits + ' - ' + nama + ' disahkan, silahkan cek status'
        : 'Pengajuan BOS Daerah ' + npsnDigits + ' - ' + nama + ' Ditolak, silahkan cek hasil verifikasi kami';
      if (tgStatusEl) tgStatusEl.textContent = 'Mengirim...';
      try {
        const topicRaw = tgTopicIdInput && tgTopicIdInput.value.trim();
        const messageThreadId = topicRaw ? Number(topicRaw) : undefined;
        const payload = { chat_id: chatId, text };
        if (!isNaN(messageThreadId) && messageThreadId > 0) payload.message_thread_id = messageThreadId;
        const resp = await fetch('https://api.telegram.org/bot' + encodeURIComponent(token) + '/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!resp.ok) { if (tgStatusEl) tgStatusEl.textContent = 'Gagal mengirim'; return; }
        if (tgStatusEl) tgStatusEl.textContent = 'Terkirim';
      } catch (e) {
        if (tgStatusEl) tgStatusEl.textContent = 'Gagal mengirim';
      }
    }

    if (typeof XLSX === 'undefined') libWarn.classList.remove('hidden');
    fileInput.addEventListener('change', handleFileChange);
    searchBtn.addEventListener('click', handleSearch);
    copyBtn.addEventListener('click', handleCopy);
    npsnInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });

      const calcWrap = document.createElement('div');
      calcWrap.className = 'stack space-y-2';
      calcWrap.innerHTML = '<hr class="border-slate-200"><div class="row flex items-center gap-3"><label class="text-sm">Jumlah Dana:</label><span id="danaDisplay" class="pill text-xs border border-slate-600 text-slate-200 rounded-full px-2 py-1">-</span></div><div class="row flex items-center gap-3 flex-wrap"><label for="userAmount" class="text-sm">Nilai yang diisi:</label><input id="userAmount" type="text" class="border border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-400 rounded-md px-3 py-2 min-w-[220px]" placeholder="Masukkan nilai (contoh: 12500000)"><span id="percentDisplay" class="status text-sm text-slate-400"></span></div>';
      resultEl.parentNode.insertBefore(calcWrap, resultEl.nextSibling);
      danaDisplayEl = document.getElementById('danaDisplay');
      userAmountInput = document.getElementById('userAmount');
      percentDisplayEl = document.getElementById('percentDisplay');
      if (userAmountInput) {
        userAmountInput.addEventListener('input', () => {
          const val = Number(String(userAmountInput.value||'').replace(/[^\d]/g,''));
          const pct = currentDana ? (val/currentDana)*100 : 0;
          percentDisplayEl.textContent = currentDana ? ('Persentase: ' + formatPercentTrunc(pct, 12) + '%') : '';
        });
      }
      const tgWrap = document.createElement('div');
      tgWrap.className = 'stack space-y-2';
      tgWrap.innerHTML = '<hr class="border-slate-200"><div class="row"><label class="text-sm">Kirim ke Telegram</label></div><div class="row flex items-center gap-3 flex-wrap"><label for="tgToken" class="text-sm">Bot Token:</label><input id="tgToken" type="text" class="border border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-400 rounded-md px-3 py-2 min-w-[260px]" placeholder="123456:ABC..."></div><div class="row flex items-center gap-3 flex-wrap"><label for="tgChatId" class="text-sm">Chat ID:</label><input id="tgChatId" type="text" class="border border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-400 rounded-md px-3 py-2 min-w-[260px]" placeholder="-1001234567890"></div><div class="row flex items-center gap-3 flex-wrap"><label for="tgTopicId" class="text-sm">Topic ID (opsional):</label><input id="tgTopicId" type="text" class="border border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-400 rounded-md px-3 py-2 min-w-[220px]" placeholder="message_thread_id"></div><div class="row flex items-center gap-3 flex-wrap"><button id="tgSahBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md">Sah!!</button><button id="tgTolakBtn" class="secondary bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-md">Ditolak!!</button><span id="tgStatus" class="status text-sm text-slate-400"></span></div>';
      resultEl.parentNode.insertBefore(tgWrap, calcWrap.nextSibling);
      tgTokenInput = document.getElementById('tgToken');
      tgChatIdInput = document.getElementById('tgChatId');
      tgTopicIdInput = document.getElementById('tgTopicId');
      tgStatusEl = document.getElementById('tgStatus');
      const savedToken = localStorage.getItem('tg_bot_token');
      const savedChat = localStorage.getItem('tg_chat_id');
      const savedTopic = localStorage.getItem('tg_topic_id');
      if (savedToken) tgTokenInput.value = savedToken;
      if (savedChat) tgChatIdInput.value = savedChat;
      if (savedTopic) tgTopicIdInput.value = savedTopic;
      tgTokenInput.addEventListener('input', () => { localStorage.setItem('tg_bot_token', tgTokenInput.value.trim()); });
      tgChatIdInput.addEventListener('input', () => { localStorage.setItem('tg_chat_id', tgChatIdInput.value.trim()); });
      tgTopicIdInput.addEventListener('input', () => { localStorage.setItem('tg_topic_id', tgTopicIdInput.value.trim()); });
      document.getElementById('tgSahBtn').addEventListener('click', () => sendTelegram('sah'));
      document.getElementById('tgTolakBtn').addEventListener('click', () => sendTelegram('tolak'));
      loadEmbeddedCSV();
      buildIndex();
      if (fileStatus) {
        fileStatus.textContent = 'Data JSON tertanam • ' + dataset.length + ' entri';
        const st = fileInput && fileInput.closest('.stack');
        if (st) st.classList.add('hidden');
      }
    })();
  </script>
</body>
</html>
